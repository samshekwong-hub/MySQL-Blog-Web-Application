{% extends 'layout.html' %} {% block content %}
<div>
  <a href="{{ url_for('add_blog')}}">Add Blog</a>
</div>

<div class="blogs">
  {% for blog in blogs %}
  <section class="blog">
    <a href="{{ url_for('blog', id = blog.id)}}"><h2>{{ blog.title }}</h2></a>
    <p>{{ blog.content }}</p>
    <div>{{blog.tags}}</div>
    <small>{{ blog.created_at }}</small>
    <div><a href="{{ url_for('edit_blog', id = blog.id)}}">Edit</a></div>
    <a href="{{ url_for('delete_blog', id = blog.id)}}">Delete</a>
  </section>
  {% endfor %} {% endblock %}
</div>
